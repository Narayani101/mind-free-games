# Deploy static client to GitHub Pages. Enable in repo: Settings → Pages → Source: GitHub Actions.
name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w client
        env:
          # Repository variable: your Render web service origin (https://xxx.onrender.com)
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          # If Pages URL is https://user.github.io/repo-name/, set to /repo-name/
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
