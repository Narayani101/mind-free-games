# Publishes client/dist to branch "gh-pages". In GitHub: Settings → Pages → Source: Deploy from branch → gh-pages / /(root)
name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Build client
        run: npm run build -w client
        env:
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          # Project site: https://<user>.github.io/mind-free-games/ — override in repo Variables if needed
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/mind-free-games/' }}
      - name: SPA fallback (direct URLs / refresh on GitHub Pages)
        run: cp client/dist/index.html client/dist/404.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
          force_orphan: true
